name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify imports (desktop entrypoint)
        run: python -c "from desktop.main_desktop import main; print('desktop.main_desktop: OK')"

      - name: Verify frontend build (static files)
        run: test -f frontend/dist/index.html && echo "frontend/dist/index.html: OK"
